name: akariyu
description: "Your dev server, in your pocket."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # SSH / SFTP
  dartssh2: ^2.13.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Biometric auth
  local_auth: ^2.3.0

  # Routing
  go_router: ^14.6.2

  # Fonts
  google_fonts: ^6.2.1

  # Terminal emulation
  xterm: ^4.0.0

  # Syntax highlighting (read-only display)
  flutter_highlight: ^0.7.0

  # Markdown rendering for Claude messages
  flutter_markdown: ^0.7.4+1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.2
  image: ^4.5.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/akariyu_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/akariyu_icon_fg.png"
  remove_alpha_ios: true
  background_color_ios: "#0A0A0A"
